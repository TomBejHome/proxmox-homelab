apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/TomBejHome/proxmox-homelab.git'
    targetRevision: HEAD
    path: kubernetes/bootstrap
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd